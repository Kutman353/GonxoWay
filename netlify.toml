[build]
  publish = "."

# Не добавлять SPA-редирект «/* → /index.html»: он ломает Netlify Forms (POST даёт 404)
# и страницы thank-you.html / nomad-dashboard.html. Сайт — многостраничный HTML.

[[headers]]
  for = "/*"
  [headers.values]
    # DENY ломает скрытый iframe при отправке формы (thank-you внутри frame → ошибка у всех).
    # SAMEORIGIN: свой же сайт может встраивать страницы; чужие домены — нет.
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"