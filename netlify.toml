[build]
  publish = "."

# Не добавлять SPA-редирект «/* → /index.html»: он ломает Netlify Forms (POST даёт 404)
# и страницы thank-you.html / nomad-dashboard.html. Сайт — многостраничный HTML.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"